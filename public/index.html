<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="version" content="0.5.1" />
<link rel="icon" type="image/png" href="assets/icons/icon-512.png">
<title>Dead Man's Switch</title>
<style>
  /* ---------- theme variables (light default, dark override) ----------
     Same palette/convention as signalk-stowage-mgmt: light mode uses an
     ordinary neutral palette; dark mode is deliberately red-shifted (a
     "night mode" that disturbs night-adapted vision far less than white/
     blue/green light matters at least as much here as on that plugin -
     this is the one you're staring at on an overnight watch). Stage
     colors in dark mode stay within that same red family rather than
     introducing a non-red hue, distinguished by shade/saturation instead
     of hue - the countdown bar, blinking outline, and text label carry
     the rest of the severity signal. */
  :root {
    --bg: #f5f4f1;
    --surface: #fff;
    --surface-alt: #f7f7f5;
    --text: #22221f;
    --text-muted: #888;
    --border: #eee;
    --border-strong: #ccc;
    --accent: #2f6f2f;
    --accent-hover: #275e27;
    --on-accent-text: #fff;

    --stage-disarmed: #9a9a94;
    --stage-armed: #2f6f2f;
    --stage-alert: #fff176;
    --stage-warn: #ffe600;
    --stage-alarm: #ce2029;
    --stage-emergency: #ce2029;
    --stage-emergency-blink: #8c1116;
    --stage-emergency-outline: #ffd500;
    /* Precomputed 20% mix of --stage-alarm over --surface. Written out
       by hand rather than color-mix() because older Chromium (e.g. 69,
       still common on marine plotters/tablets) doesn't support
       color-mix() at all - keep in sync if either source color changes. */
    --alarm-surface: #f5d2d4;
    /* alert/warn are pale/bright yellow - white text (the default for
       every other stage) would be unreadable on them, so those two
       stages use dark text instead. */
    --state-text-pale: #1a1a15;
  }

  [data-theme="dark"] {
    --bg: #16181c;
    --surface: #21242a;
    --surface-alt: #262a31;
    --text: #d9776a;
    --text-muted: #a15850;
    --border: #3a2c29;
    --border-strong: #4d332e;
    --accent: #a8443a;
    --accent-hover: #bd5347;
    --on-accent-text: #fbdbd3;

    --stage-disarmed: #6b4a44;
    --stage-armed: #a8443a;
    --stage-alert: #b8543f;
    --stage-warn: #c2694f;
    --stage-alarm: #e0574a;
    --stage-emergency: #e0574a;
    --stage-emergency-blink: #ff5c47;
    /* Deliberately NOT yellow here - the daylight yellow outline would
       reintroduce a non-red hue into the red-shifted night palette and
       defeat the point of it. Stays within the red family instead. */
    --stage-emergency-outline: #ff5c47;
    /* Precomputed 20% mix of dark --stage-alarm over dark --surface -
       see the light-theme note on this variable. */
    --alarm-surface: #472e30;
    --state-text-pale: var(--on-accent-text);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    /* system-ui must come FIRST: on older Linux Chromium (e.g. 69 on
       marine plotters), an unknown leading family like -apple-system is
       handed to fontconfig, which never fails a lookup - it substitutes
       its "best match", usually the default SERIF - so the sans-serif at
       the end of the stack was never reached. system-ui resolves
       natively (Chrome 56+) and short-circuits that. */
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: background-color 0.15s ease, color 0.15s ease;
  }
  /* Form controls don't inherit the page font by default, and nearly all
     text in this app lives inside <button>s. */
  button { font-family: inherit; }
  /* Child margins instead of flex gap throughout - gap in flexbox needs
     Chrome 84+, older Chromium just renders everything flush. */
  main {
    padding: 60px 20px 40px;
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  main > * + * { margin-top: 16px; }

  .toolbar {
    position: fixed;
    top: 14px;
    right: 14px;
    display: flex;
  }
  .toolbar > * + * { margin-left: 8px; }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    color: var(--text);
    border-radius: 8px;
    padding: 7px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .icon-btn:hover { background: var(--surface-alt); }
  .icon-btn svg { width: 18px; height: 18px; }
  button.disarm-btn {
    width: auto;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 12px;
  }

  /* The merged state/action button - shows the current stage, the
     remaining time in that stage's window, and doubles as the ack/arm
     action (there's no separate "reset" button anymore - tapping this
     one IS the reset). */
  button.state-button {
    width: 100%;
    padding: 26px 18px;
    border-radius: 16px;
    border: 3px solid transparent;
    cursor: pointer;
    color: var(--on-accent-text);
    text-align: center;
    display: flex;
    flex-direction: column;
    transition: background 0.2s ease, transform 0.05s ease;
  }
  button.state-button > * + * { margin-top: 6px; }
  button.state-button:active { transform: scale(0.98); }
  button.state-button.blink {
    border-width: 6px;
    border-color: var(--stage-emergency-outline);
    animation: blink-button 0.28s steps(1, end) infinite;
  }
  @keyframes blink-button {
    0%, 100% {
      background-color: var(--stage-emergency);
      transform: scale(1);
    }
    50% {
      background-color: var(--stage-emergency-blink);
      transform: scale(1.035);
    }
  }
  .state-title { font-size: 19px; font-weight: 700; line-height: 1.3; }
  .state-countdown { font-size: 19px; font-weight: 700; line-height: 1.3; opacity: 0.9; }
  .state-cta { font-size: 13px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; opacity: 0.85; }
  .state-cta.emergency-cta { font-size: 32px; font-weight: 800; letter-spacing: 0.04em; opacity: 1; }
  /* The extra breathing room the ctas used to get from margin+gap,
     rolled into one margin now that gap is gone. Selector matches the
     child-margin rule's specificity so these win. */
  button.state-button > .state-cta { margin-top: 8px; }
  button.state-button > .state-cta.emergency-cta { margin-top: 14px; }

  .progress-track {
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 1s linear, background-color 0.2s ease;
  }

  .connection-banner {
    width: 100%;
    background: var(--alarm-surface);
    border: 2px solid var(--stage-alarm);
    color: var(--text);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }
  .connection-banner > * + * { margin-top: 2px; }
  .connection-banner strong { color: var(--stage-alarm); font-size: 14px; }

  /* Dimmed rather than hidden - the whole point is to keep showing the
     last known state while making unmistakably clear it can no longer be
     trusted as current. */
  .state-button.stale,
  .progress-track.stale {
    opacity: 0.65;
    filter: saturate(0.6);
  }
  .loading-note { color: var(--text-muted); font-size: 13px; }

  /* ---------- embedded mode (?embedded=true) ----------
     For hosting inside an iframe on a dashboard: transparent page
     background, no toolbar (arm/disarm + theme controls), and the state
     button grows to fill the whole viewport. The progress bar is
     overlaid near the bottom of the button itself (the button IS the
     page, so there's no room for it as a separate element); the
     connection-lost banner overlays the top of the button instead of
     pushing it down, so the stale warning is still visible without
     breaking the full-page layout. */
  [data-embedded],
  [data-embedded] body {
    background: transparent;
    /* The emergency blink scales the button slightly past 100% - at
       full-viewport size that would flash scrollbars in the iframe. */
    overflow: hidden;
  }
  [data-embedded] .toolbar { display: none; }
  /* The height:100% chain has to pass through the render root, which
     otherwise has auto height and collapses main to its content. */
  [data-embedded] #app { height: 100%; }
  [data-embedded] main {
    height: 100%;
    max-width: none;
    padding: 0;
    position: relative;
  }
  /* No spacing between children in embedded mode - and the margin must
     not leak onto the absolutely-positioned banner/progress overlays
     (a margin-top would shove the top-anchored banner down). */
  [data-embedded] main > * + * { margin-top: 0; }
  [data-embedded] button.state-button {
    flex: 1;
    height: 100%;
    justify-content: center;
    /* Center the text within the space ABOVE the overlaid progress bar,
       not within the full button - the bar's top edge sits 36px from the
       button's bottom (24px inset + 12px bar incl. borders, see
       .progress-track below), so the bottom padding has to exceed the
       26px top padding by exactly that much for the flex centering to
       land in the optical middle. */
    padding-bottom: 62px;
  }
  /* Overlaid on the bottom of the button (main is position:relative and
     the button already fills its full height, so anchoring to main's
     edges lines this up with the button's own bottom edge) rather than
     sitting as its own bar beneath it - there's no room for a separate
     element once the button fills the whole viewport. Neutral
     translucent colors (not the stage color used elsewhere) since the
     button's own background is whatever saturated stage color is
     currently active - a same-color fill would disappear into it. */
  [data-embedded] .progress-track {
    position: absolute;
    width: auto;
    left: 24px;
    right: 24px;
    bottom: 24px;
    z-index: 1;
    background: rgba(0, 0, 0, 0.22);
    border-color: rgba(255, 255, 255, 0.25);
  }
  [data-embedded] .progress-fill {
    background: rgba(255, 255, 255, 0.55) !important;
  }
  [data-embedded] .connection-banner {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1;
    border-radius: 0 0 10px 10px;
  }
</style>
<script>
  // Set before first paint so an iframe host never sees a flash of the
  // opaque page background.
  if (new URLSearchParams(window.location.search).get('embedded') === 'true') {
    document.documentElement.setAttribute('data-embedded', '')
  }
</script>
</head>
<body>
<div id="app"></div>
<script type="module">
import { render, html, useState, useEffect, useRef } from './vendor/htm-preact-standalone.module.js'

// A plugin's registerWithRouter() API is always mounted at
// /plugins/<pluginId>, regardless of where the webapp's own static files
// (this page) are served from under the signalk-webapp convention - so
// this must be a fixed absolute path, not derived from window.location.
const BASE = '/plugins/signalk-dead-mans-switch'
const THEME_STORAGE_KEY = 'deadmansswitch-theme'

const STAGE_TITLE = {
  disarmed: 'Disarmed',
  armed: 'ARMED',
  alert: 'ALERT',
  warn: 'WARNING',
  alarm: 'ALARM',
  emergency: 'WATCH INCAPACITATED',
}

const ACK_LABEL = {
  disarmed: 'Tap to arm',
  armed: 'Tap to reset timer',
  alert: 'Tap to acknowledge',
  warn: 'Tap to acknowledge',
  alarm: 'Tap to acknowledge',
  emergency: 'TAP HERE',
}

function stageColorVar(stage) {
  return `var(--stage-${stage || 'disarmed'})`
}

// alert/warn are pale/bright yellow backgrounds - the white text used for
// every other stage would be unreadable on them, so those two get dark
// text instead.
function stageTextColorVar(stage) {
  return stage === 'alert' || stage === 'warn' ? 'var(--state-text-pale)' : 'var(--on-accent-text)'
}

// Total duration (seconds) of whatever window the current stage is
// counting down within, so the progress bar can render a proportion
// rather than just an absolute number.
function stageTotalSeconds(stage, config) {
  if (stage === 'armed') return config.checkIntervalMinutes * 60
  if (stage === 'alert') return config.ackWindowSeconds
  if (stage === 'warn') return config.warnWindowSeconds
  if (stage === 'alarm') return config.alarmWindowSeconds
  return null // disarmed / emergency: no countdown
}

function formatSeconds(s) {
  if (s === null || s === undefined) return null
  const m = Math.floor(s / 60)
  const sec = s % 60
  return `${m}:${String(sec).padStart(2, '0')}`
}

function SunIcon() {
  return html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="12" cy="12" r="4.5" />
    <path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8l1.8-1.8M18 6l1.8-1.8" />
  </svg>`
}
function MoonIcon() {
  return html`<svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" />
  </svg>`
}

function getPreferredTheme() {
  let stored = null
  try {
    stored = window.localStorage.getItem(THEME_STORAGE_KEY)
  } catch (err) {
    // localStorage can throw in some restricted/embedded browsers - fall
    // through to the OS preference in that case.
  }
  if (stored === 'light' || stored === 'dark') return stored
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
  return prefersDark ? 'dark' : 'light'
}

function ThemeToggle({ theme, setTheme }) {
  const label = theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
  return html`
    <button type="button" class="icon-btn theme-toggle" title=${label} aria-label=${label}
      onClick=${() => setTheme(theme === 'dark' ? 'light' : 'dark')}>
      ${theme === 'dark' ? html`<${SunIcon} />` : html`<${MoonIcon} />`}
    </button>
  `
}

function App() {
  const [status, setStatus] = useState(null)
  const [connectionError, setConnectionError] = useState(null)
  const [lastGoodAt, setLastGoodAt] = useState(null)
  const [theme, setTheme] = useState(getPreferredTheme())
  const pollRef = useRef(null)
  const audioRef = useRef(null)
  const alarmAudioRef = useRef(null)
  const alarmIntervalRef = useRef(null)

  // Browsers block audio.play() from firing with sound until the page has
  // seen at least one real user gesture (autoplay policy). We can't
  // guarantee anyone will tap anything before emergency/alarm actually
  // hits, so instead we "unlock" both audio elements on the very first
  // tap/click anywhere on the page (arming, acking, toggling the theme -
  // anything counts) by playing-then-immediately-pausing them. That one
  // real gesture satisfies the browser's policy for every future
  // programmatic play() call on these same elements for the rest of the
  // page's life, so they can then start on their own later with no
  // further interaction needed.
  useEffect(() => {
    function unlockOne(el) {
      if (!el) return
      el.play()
        .then(() => {
          el.pause()
          el.currentTime = 0
        })
        .catch(() => {
          // Autoplay still blocked (e.g. no gesture actually registered) -
          // next tap will just try again.
        })
    }
    function unlock() {
      unlockOne(audioRef.current)
      unlockOne(alarmAudioRef.current)
      window.removeEventListener('pointerdown', unlock)
    }
    window.addEventListener('pointerdown', unlock)
    return () => window.removeEventListener('pointerdown', unlock)
  }, [])

  // Play the siren, looping at full volume, for exactly as long as the
  // switch is in "emergency" - start the instant it's reached, stop the
  // instant it's acknowledged (ack always drops back out of emergency).
  // Gated by the plugin's "Play sounds in browser" config option -
  // missing/undefined (e.g. an older server) defaults to enabled, only an
  // explicit `false` turns audio off.
  useEffect(() => {
    const el = audioRef.current
    if (!el) return
    const soundsEnabled = !status || !status.config || status.config.playSounds !== false
    if (status && status.state === 'emergency' && soundsEnabled) {
      el.volume = 1
      el.loop = true
      el.play().catch(() => {
        // Blocked by autoplay policy because nobody has tapped the page
        // yet - the pointerdown unlock handler above will catch the next
        // tap and this effect re-running (status keeps polling) will
        // retry play() shortly after.
      })
    } else {
      el.pause()
      el.currentTime = 0
    }
  }, [status && status.state, status && status.config && status.config.playSounds])

  // Replay the alarm sound every 10s for exactly as long as the switch is
  // in "alarm" - once immediately on entering the stage, then on a
  // repeating timer, stopping (and clearing the timer) the moment the
  // stage changes away from "alarm" in either direction (escalating to
  // emergency, which has its own continuous siren instead, or being
  // acknowledged). Same playSounds gating as the siren above.
  useEffect(() => {
    if (alarmIntervalRef.current) {
      clearInterval(alarmIntervalRef.current)
      alarmIntervalRef.current = null
    }
    const soundsEnabled = !status || !status.config || status.config.playSounds !== false
    if (status && status.state === 'alarm' && soundsEnabled) {
      const playOnce = () => {
        const el = alarmAudioRef.current
        if (!el) return
        el.currentTime = 0
        el.play().catch(() => {
          // Blocked by autoplay policy - the pointerdown unlock handler
          // will catch the next tap, and the next 10s tick retries.
        })
      }
      playOnce()
      alarmIntervalRef.current = setInterval(playOnce, 10000)
    }
    return () => {
      if (alarmIntervalRef.current) {
        clearInterval(alarmIntervalRef.current)
        alarmIntervalRef.current = null
      }
    }
  }, [status && status.state, status && status.config && status.config.playSounds])

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme)
    try {
      window.localStorage.setItem(THEME_STORAGE_KEY, theme)
    } catch (err) {
      // ignore - theme just won't persist across reloads on this browser
    }
  }, [theme])

  // When the plugin's "Automatically switch theme" option is on, follow
  // its recommendation (derived server-side from environment.sun/mode)
  // instead of waiting for a manual toggle. Only acts when the
  // recommendation actually differs from the current theme, so this
  // doesn't fight a fresh manual click mid-poll-cycle for no reason - and
  // does nothing at all if the option is off or the server has no
  // recommendation yet (e.g. neither environment path is populated).
  useEffect(() => {
    if (!status || !status.config || !status.config.autoTheme) return
    const recommendation = status.themeRecommendation
    if ((recommendation === 'light' || recommendation === 'dark') && recommendation !== theme) {
      setTheme(recommendation)
    }
  }, [status && status.config && status.config.autoTheme, status && status.themeRecommendation])

  // fetch() only rejects on a network-level failure, NOT on an HTTP error
  // status - without this check a 404 from a wrong path would silently
  // leave the page showing stale/blank state forever.
  function checkOk(res) {
    if (!res.ok) throw new Error(`Request to ${res.url} failed: HTTP ${res.status}`)
    return res
  }

  function loadStatus() {
    fetch(`${BASE}/status`, { cache: 'no-store' })
      .then(checkOk)
      .then((r) => r.json())
      .then((s) => {
        setStatus(s)
        setConnectionError(null)
        setLastGoodAt(Date.now())
      })
      // Deliberately does NOT clear `status` here - losing the connection
      // shouldn't blank the screen and erase the last thing we knew about
      // the watch. It's flagged instead (see the connection-lost banner
      // and the .stale styling below) so the person can tell the
      // difference between "everything's fine" and "we just don't know
      // anymore", without losing the last real information either way.
      .catch((e) => setConnectionError(e.message))
  }

  useEffect(() => {
    loadStatus()
    pollRef.current = setInterval(loadStatus, 1000)
    return () => clearInterval(pollRef.current)
  }, [])

  function post(path) {
    fetch(`${BASE}${path}`, { method: 'POST', cache: 'no-store' })
      .then(checkOk)
      .then(() => loadStatus())
      .catch((e) => setConnectionError(e.message))
  }

  function handleDisarm() {
    // Disarming silences the check-in entirely - a native confirm() here
    // matches the pattern used for other destructive/state-losing actions
    // across his other plugins (e.g. signalk-stowage-mgmt's delete
    // confirmations), rather than introducing a bespoke modal for just
    // this one button.
    if (window.confirm('Disarm the dead man\u2019s switch? No check-ins will be requested until it is re-armed.')) {
      post('/disarm')
    }
  }

  function handleStateButton() {
    if (status && status.state === 'disarmed') {
      post('/arm')
    } else {
      post('/ack')
    }
  }

  if (!status) {
    return html`
      <audio ref=${audioRef} src="./audio/emergency-siren.wav" preload="auto"></audio>
      <audio ref=${alarmAudioRef} src="./audio/alarm-intercom.wav" preload="auto"></audio>
      <div class="toolbar"><${ThemeToggle} theme=${theme} setTheme=${setTheme} /></div>
      <main>
        ${connectionError
          ? html`<div class="connection-banner">
              <strong>\u26a0 Can\u2019t reach the SignalK server.</strong>
              <span>${connectionError}</span>
            </div>`
          : html`<p class="loading-note">Loading\u2026</p>`}
      </main>
    `
  }

  const stage = status.state
  const color = stageColorVar(stage)
  const textColor = stageTextColorVar(stage)
  const totalSeconds = stageTotalSeconds(stage, status.config || {})
  const remaining = status.secondsRemaining
  // "Fill" direction: the bar starts empty and fills up as time elapses
  // toward the deadline (not a countdown drain). Emergency has no
  // deadline (terminal) - render it fully filled rather than hiding it,
  // so the layout doesn't jump when the top stage is reached.
  const fillPct =
    stage === 'emergency'
      ? 100
      : totalSeconds && remaining !== null
      ? Math.max(0, Math.min(100, ((totalSeconds - remaining) / totalSeconds) * 100))
      : 0

  return html`
    <audio ref=${audioRef} src="./audio/emergency-siren.wav" preload="auto"></audio>
    <audio ref=${alarmAudioRef} src="./audio/alarm-intercom.wav" preload="auto"></audio>
    <div class="toolbar">
      ${stage !== 'disarmed' &&
      html`<button type="button" class="icon-btn disarm-btn" onClick=${handleDisarm}>Disarm</button>`}
      ${!(status.config && status.config.autoTheme) && html`<${ThemeToggle} theme=${theme} setTheme=${setTheme} />`}
    </div>
    <main>
      ${connectionError &&
      html`<div class="connection-banner">
        <strong>\u26a0 Connection to the SignalK server lost.</strong>
        <span>
          Showing the last known state${lastGoodAt ? html` from ${new Date(lastGoodAt).toLocaleTimeString()}` : ''}
          - it is no longer updating.
        </span>
      </div>`}

      <button
        class=${`state-button ${stage === 'emergency' ? 'blink' : ''} ${connectionError ? 'stale' : ''}`}
        style=${{ background: color, color: textColor }}
        onClick=${handleStateButton}
      >
        <span class="state-title">${STAGE_TITLE[stage] || stage}</span>
        ${remaining !== null &&
        html`<span class="state-countdown">${formatSeconds(remaining)}</span>`}
        ${stage === 'emergency' &&
        html`<span class="state-countdown">No further auto-escalation</span>`}
        <span class=${`state-cta ${stage === 'emergency' ? 'emergency-cta' : ''}`}>${ACK_LABEL[stage] || 'Tap to acknowledge'}</span>
      </button>

      <div class=${`progress-track ${connectionError ? 'stale' : ''}`}>
        <div class="progress-fill" style=${{ width: `${fillPct}%`, background: color }}></div>
      </div>
    </main>
  `
}

render(html`<${App} />`, document.getElementById('app'))
</script>
</body>
</html>
